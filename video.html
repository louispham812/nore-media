                <h2 style="font-size: 2rem; margin-bottom: 2.5rem; text-align: center;">Sunshine Beach Resort</h2>

                <!-- Lưới video dự án 1 (Thêm margin-bottom: 5rem để cách xa dự án 2) -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; margin-bottom: 5rem;">

                    <article class="card" style="padding: 1.25rem;">
                        <div
                            style="border-radius: 0.75rem; overflow: hidden; border: 1px solid var(--border); background-color: #000; display: flex;">
                            <video width="100%" controls preload="metadata">

                        </div>

                            </video>
                        </div>

                            </video>
                        </div>
                    </article>
                </div>

                <!-- ============================== -->
                <!-- DỰ ÁN 2: SGARZI LUIGI -->
                <!-- ============================== -->
                <h2 style="font-size: 2rem; margin-bottom: 2.5rem; text-align: center;">SGARZI LUIGI</h2>

                <!-- Đưa video ra giữa và giới hạn độ rộng thay vì dùng Grid kéo giãn 100% -->
                <div style="max-width: 800px; margin: 0 auto 5rem auto;">
                    <article class="card" style="padding: 1.25rem;">
                        <!-- Bỏ display: flex để khung không bị ép dẹt -->
                        <div
                            style="border-radius: 0.75rem; overflow: hidden; border: 1px solid var(--border); background-color: #000;">

                            <!-- Thêm aspect-ratio: 16/9 để ép tỷ lệ chuẩn, display: block để xóa khoảng trắng thừa -->
                            <video width="100%" controls preload="metadata"
                                style="display: block; aspect-ratio: 16/9; width: 100%; height: auto; object-fit: cover;">
                                <!-- Đã sửa lại tên file không có dấu cách -->
                                <source src="video/SGARZI-LUIGI.mp4" type="video/mp4">
                                Trình duyệt của bạn không hỗ trợ thẻ video.
                            </video>

                        </div>
                    </article>
                </div>

            </div>
